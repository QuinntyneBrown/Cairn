<button
  class="btn"
  [class.btn--primary]="variant() === 'primary'"
  [class.btn--secondary]="variant() === 'secondary'"
  [class.btn--ghost]="variant() === 'ghost'"
  [class.btn--danger]="variant() === 'danger'"
  [class.btn--full]="full()"
  [attr.type]="type()"
  [disabled]="disabled()"
>
  <ng-content />
</button>
