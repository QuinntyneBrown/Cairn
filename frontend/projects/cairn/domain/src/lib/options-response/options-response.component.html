<fieldset class="opts" [disabled]="disabled()">
  <legend class="sr-only">Choose one</legend>

  <div class="opts__list">
    @for (option of options(); track option.id) {
      <label class="opts__choice" [class.opts__choice--on]="value() === option.id">
        <input
          class="sr-only"
          type="radio"
          [name]="group"
          [checked]="value() === option.id"
          [disabled]="disabled()"
          (change)="choose(option.id)"
          [attr.data-testid]="'answer-option-' + option.id"
        />
        <span class="opts__label">{{ option.label }}</span>
      </label>
    }
  </div>
</fieldset>
